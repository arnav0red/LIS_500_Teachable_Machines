<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character encoding and responsive viewport for mobile devices -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIS 500: Code and Power</title>
    <!-- External stylesheet — all styling is CSS-driven, no inline styles -->
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.9.0/addons/p5.sound.min.js"></script>

    <script src="https://unpkg.com/ml5@0.5.0/dist/ml5.min.js"></script>

</head>

<body>
    <!-- Header placeholder — populated dynamically from header.html -->
    <div id="header"></div>
    <script>
        // Fetch shared header component and inject it into the page
        fetch("header.html")
            .then(res => res.text())
            .then(html =>
            {
                document.getElementById("header").innerHTML = html;
            });
    </script>

    <!-- Main content area wrapped in page-wrapper div for consistent margins -->
    <main>
        <div class="page-wrapper">


            <!-- Welcome section introducing the course and group members -->
            <section class="welcome-panel">
                <p class="group">
                    What lessons from 'Unmasking AI' are resonant for you as you complete this assignment?
                </p>
                <p>Template
                </p>
            </section>
            <div id="app">
                <script src="sketch.js"></script>
            <!-- </div>
            <div class="video-container"> -->
                <iframe src="https://youtu.be/xXkOtlu6lUY" title="LIS 500 Teachable Machine Demo" frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>

        </div>
    </main>
</body>

</html>
